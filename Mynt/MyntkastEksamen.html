<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .kron_eller--mynt {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      #antall__runder {
        border-radius: 9999px;
      }

      .btn__submit {
        border-radius: 9999px;
      }

      .bilder {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 72px 0;
      }

      /* animation: flip 2s ease-in-out; */

      .kron__img {
        padding: 0 56px;
      }

      .mynt__img {
        padding: 0 56px;
      }

      .btn {
        background-color: #fff;
        outline: none;
        cursor: pointer;
      }

      .resultat {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      .btn__btn {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px 0 0 0;
      }

      .resultat__para {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      @keyframes flip {
        0%,
        10% {
          transform: rotateY(0turn);
        }
        50% {
          transform: rotateY(0.5turn) scale(0.5);
        }
        90%,
        100% {
          transform: rotateY(1turn);
        }
      }
    </style>
  </head>
  <body>
    <div class="kron_eller--mynt">
      <h2>Kron Eller Mynt</h2>
      <h4>Antall Runder</h4>
      <form action="">
        <input type="text" id="antall__runder" name="antRunder" />
        <input type="submit" value="Submit" class="btn__submit" />
      </form>
    </div>
    <div class="btn__btn">
      <button class="btn" onclick="kronmynt()">Kron</button>
      <button class="btn" onclick="kronmynt()">Mynt</button>
    </div>
    <div class="bilder">
      <img src="/mynt1.png" alt="" class="kron__img" />
    </div>
    <div class="resultat">
      <h3>Resultat</h3>
      <div class="resultat__para">
        <h4 class="mynt__teller">Mynt: 1</h4>
        <h4 class="kron__teller">Kron: 2</h4>
      </div>
    </div>

    <script>
      function kronmynt() {
        var randomKronEllerMynt = Math.floor(Math.random() * 2) + 1;
        var randomKronEllerMyntBilde = "mynt" + randomKronEllerMynt + ".png";

        document
          .querySelectorAll("img")[0]
          .setAttribute("src", randomKronEllerMyntBilde);
      }
    </script>
  </body>
</html>
